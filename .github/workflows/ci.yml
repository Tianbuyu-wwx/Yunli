name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 取消并发：同一分支新 push 取消旧运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          pip-cache: true
          cache: pip

      - name: Display Python toolchain info
        run: |
          python --version
          pip --version

      - name: Upgrade pip and install test dependencies
        run: |
          python -m pip install --upgrade pip
          # 插件只依赖标准库；这里只安装测试工具链
          pip install pytest pytest-asyncio

      - name: Quick smoke import
        run: |
          python -c "import pytest, pytest_asyncio; print('pytest', pytest.__version__, 'pytest-asyncio', pytest_asyncio.__version__)"

      - name: Run test suite (verbose)
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=20

      - name: Run test suite (quiet, summary)
        if: always()
        run: |
          python -m pytest tests/ -q --tb=line 2>&1 | tail -40

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: |
          pip install coverage pytest-cov
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term --cov-config=/dev/null || true

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: yunli-py${{ matrix.python-version }}

  lint:
    name: flake8 (Python 3.11)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters and test runner
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio

      - name: flake8 (PEP8 + pyflakes)
        run: |
          # - E501 行长过长：README/code 部分长字符串无需强制
          # - W503 行尾二元运算符：现代风格允许
          # - E203 切片冒号空格：与 black/black-formatted 代码冲突
          flake8 . \
            --count \
            --select=E9,F63,F7,F82,E1,E2,E3,E5,W6 \
            --extend-ignore=E501,W503,E203 \
            --exclude=.git,.github,__pycache__,build,dist,*.egg-info,evolution/discoveries,evolution/logs,evolution/pending_rules,evolution/eval/data,data,database \
            --show-source \
            --statistics || true

      - name: Run pytest (quick)
        run: |
          python -m pytest tests/ -q --tb=short